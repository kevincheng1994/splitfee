<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>分帳紀錄</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
  <h3>分帳紀錄</h3>
  <form id="form">
    <input class="form-control mb-2" name="name" placeholder="姓名" required>
    <input class="form-control mb-2" name="amount" type="number" placeholder="金額" required>
    <button class="btn btn-primary">送出</button>
  </form>

  <hr>
  <div id="records"></div>

  <script>
    const SHEET_API = 'https://script.google.com/macros/s/AKfycbzqkqkwCxy9eUNPGAXjahe3yfXX-l-GtoUo4KVXHnatoM3phP36esLWsfB1AuY3UDUG/exec';

    async function loadData() {
      const res = await fetch(SHEET_API);
      const data = await res.json();
      const container = document.getElementById('records');
      container.innerHTML = '';
      data.forEach(r => {
        const row = document.createElement('div');
        row.className = 'border p-2 my-1';
        row.innerHTML = `
          <strong>${r.name}</strong>：${r.amount} 元
          <button class="btn btn-sm btn-danger float-end" onclick="deleteRecord('${r.id}')">刪除</button>
        `;
        container.appendChild(row);
      });
    }

    document.getElementById('form').onsubmit = async (e) => {
      e.preventDefault();
      const data = {
        name: e.target.name.value,
        amount: e.target.amount.value
      };
      await fetch(SHEET_API, {
        method: 'POST',
        body: JSON.stringify(data)
      });
      e.target.reset();
      loadData();
    };

    async function deleteRecord(id) {
      await fetch(`${SHEET_API}?action=delete&id=${id}`);
      loadData();
    }

    loadData();
  </script>

  <!-- 新增：計算分帳按鈕 -->
  <div class="container mt-4">
    <button class="btn btn-success w-100" onclick="calculateSplit()">📊 計算分帳</button>
    <div id="settlementResult" class="mt-3"></div>
  </div>
  
  <script>
    function calculateSplit() {
      fetch(SHEET_API)
        .then(response => response.json())
        .then(data => {
          if (!Array.isArray(data) || data.length === 0) {
            document.getElementById('settlementResult').innerText = '無資料可計算';
            return;
          }
  
          const nameToAmount = {};
          let total = 0;
  
          data.forEach(entry => {
            const name = entry.name.trim();
            const amount = parseFloat(entry.amount);
            if (!nameToAmount[name]) nameToAmount[name] = 0;
            nameToAmount[name] += amount;
            total += amount;
          });
  
          const names = Object.keys(nameToAmount);
          const average = total / names.length;
  
          // 計算每人差額
          const balances = names.map(name => ({
            name,
            paid: nameToAmount[name],
            diff: +(nameToAmount[name] - average).toFixed(2)
          }));
  
          // 分兩邊：要給錢 / 收錢
          const payers = balances.filter(p => p.diff < 0).map(p => ({ ...p }));
          const receivers = balances.filter(p => p.diff > 0).map(p => ({ ...p }));
  
          const settlements = [];
  
          for (let payer of payers) {
            while (payer.diff < 0 && receivers.length > 0) {
              const receiver = receivers[0];
              const amount = Math.min(-payer.diff, receiver.diff);
              settlements.push(`${payer.name} 給 ${receiver.name} ${amount.toFixed(2)} 元`);
              payer.diff += amount;
              receiver.diff -= amount;
              if (receiver.diff === 0) receivers.shift();
            }
          }
  
          document.getElementById('settlementResult').innerHTML = `
            <div class="alert alert-info">
              <strong>平均每人需出：</strong> ${average.toFixed(2)} 元
              <hr>
              ${settlements.length > 0 ? settlements.map(s => `<div>${s}</div>`).join('') : '所有人花費相等，無需分帳'}
            </div>`;
        });
    }
  </script>
  
</body>
</html>
